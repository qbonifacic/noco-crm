name: CI
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run tests
        run: npm test || echo No tests configured
      - name: Security check - no secrets in code
        run: |
          if grep -rn ghp_|sk-|AKIA|passwords*= --include=*.py --include=*.js --include=*.ts . | grep -v node_modules | grep -v .env; then
            echo ::error::Potential secrets found in code!
            exit 1
          fi
